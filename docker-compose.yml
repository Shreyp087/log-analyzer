services:
  postgres:
    image: postgres:16-alpine
    container_name: log-analyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: log_analyzer
      POSTGRES_USER: log_user
      POSTGRES_PASSWORD: log_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U log_user -d log_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: log-analyzer-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 0
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://log_user:log_password@postgres:5432/log_analyzer
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: log-analyzer-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  backend_uploads:

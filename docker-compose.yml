version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: log-analyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: log_analyzer
      POSTGRES_USER: log_user
      POSTGRES_PASSWORD: log_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
